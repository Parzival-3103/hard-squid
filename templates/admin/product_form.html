{% extends 'admin/base.html' %}
{% block title %}Editar producto{% endblock %}
{% block content %}
<div class="admin-heading">
  <div><span class="eyebrow dark">INVENTARIO / #{{ product.id }}</span><h1>Editar producto</h1></div>
  <a href="{{ url_for('admin_products') }}">← Volver</a>
</div>
<section class="panel form-panel">
  <form method="post" enctype="multipart/form-data">
    <div class="edit-product-preview"><img src="{{ url_for('static', filename=product.image) }}" alt="{{ product.name }}"></div>
    <div class="form-grid">
      <label class="full">Nombre<input name="name" value="{{ product.name }}" required></label>
      <label class="full">Descripción<textarea name="description" rows="4" required>{{ product.description }}</textarea></label>
      <label>Precio de venta<input type="number" name="price" step=".01" min="0" value="{{ product.price }}" required></label>
      <label>Costo<input type="number" name="cost" step=".01" min="0" value="{{ product.cost }}" required></label>
      <label>Stock<input type="number" name="stock" min="0" value="{{ product.stock }}" required></label>
      <label>Categoría<select name="category">{% for c in ['Dama','Caballero','Unisex'] %}<option {{ 'selected' if product.category==c }}>{{ c }}</option>{% endfor %}</select></label>
      <label class="full">Proveedor<select name="supplier_id"><option value="">Sin proveedor</option>{% for supplier in suppliers %}<option value="{{ supplier.id }}" {{ 'selected' if product.supplier_id==supplier.id }}>{{ supplier.name }}</option>{% endfor %}</select></label>
      <label class="full">Tallas<input name="size" value="{{ product.size }}"></label>
      <label class="full file-input">Cambiar imagen<input type="file" name="image" accept="image/png,image/jpeg,image/webp"><span>Déjalo vacío para conservar la imagen actual.</span></label>
      <label class="checkbox full"><input type="checkbox" name="featured" {{ 'checked' if product.featured }}> Producto destacado</label>
      <button class="button dark">Guardar cambios</button>
    </div>
  </form>
</section>
{% endblock %}
